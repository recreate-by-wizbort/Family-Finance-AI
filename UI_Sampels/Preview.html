<div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-primary-container/10 rounded-full blur-[100px] pointer-events-none"></div>

<div class="mb-1">
<span class="font-headline font-extralight text-on-surface-variant tracking-[0.4em] text-sm uppercase">BANK OF</span>
</div>
<!-- Focal Typography with Halo -->
<div class="relative group">

<div class="absolute -inset-x-12 -inset-y-8 gold-halo rounded-full opacity-60"></div>
<div class="relative flex flex-col">
<h1 class="font-headline font-extrabold text-6xl md:text-8xl tracking-tighter text-on-surface leading-[0.9]">
                        RECREATE
                    </h1>
<div class="flex items-center gap-4 mt-2">
<span class="font-headline font-light text-2xl md:text-3xl tracking-widest text-on-surface-variant uppercase">BY</span>
<span class="font-headline font-bold text-3xl md:text-4xl tracking-tight text-primary">WIZBORT</span>
</div>
</div>
</div>

</div>
</div>

<style>
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
